name: Model Targeted Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  model-targeted:
    name: ${{ matrix.os }}-model-targeted
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-15
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Run model and Worker targeted suites
        run: >-
          uv run pytest tests/model tests/model_sources tests/integration/model
          tests/runtime_worker -q
