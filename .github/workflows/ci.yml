name: Fast Gate

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-gate:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-15]
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
      # Persist Nuitka/ccache under the workspace so Actions cache can restore it.
      # Do not cache dist/captioner or dist/.nuitka-build (full build outputs).
      NUITKA_CACHE_DIR: ${{ github.workspace }}/.cache/nuitka
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install Linux runtime and compiler cache
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            ccache \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0
          ccache --max-size=1G
          ccache --set-config=compression=true
      - name: Restore Nuitka compiler cache
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: .cache/nuitka
          key: >-
            nuitka-${{ runner.os }}-py313-${{ hashFiles('uv.lock', 'scripts/build_nuitka.py') }}-${{ github.sha }}
          restore-keys: |
            nuitka-${{ runner.os }}-py313-${{ hashFiles('uv.lock', 'scripts/build_nuitka.py') }}-
            nuitka-${{ runner.os }}-py313-
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Full quality gate
        run: uv run python scripts/check.py --full
      - name: Subtitle corpus source smoke
        run: uv run captioner subtitle-corpus tests/fixtures/transcripts --json
      - name: Nuitka standalone build
        if: runner.os == 'Linux'
        run: |
          ccache --zero-stats || true
          uv run python scripts/build_nuitka.py --clean --version 0.0.0
          ccache --show-stats || true
      - name: Compiled subtitle corpus smoke
        if: runner.os == 'Linux'
        run: ./dist/captioner/captioner --cli subtitle-corpus tests/fixtures/transcripts --json
      - name: CLI help smoke test
        run: uv run python main.py --cli --help
      - name: GUI smoke test (source tree)
        run: uv run python main.py --gui --smoke-test
      - name: Compiled GUI smoke
        if: runner.os == 'Linux'
        run: ./dist/captioner/captioner --gui --smoke-test

  media-integration:
    name: ubuntu-24.04-media-integration
    runs-on: ubuntu-24.04
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y ffmpeg
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Real FFmpeg integration
        run: uv run pytest tests/integration/test_ffmpeg_pipeline.py -q -m integration
