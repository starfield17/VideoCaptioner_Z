name: Fast Gate

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-gate:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6.3.1
        with:
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Full quality gate
        run: uv run python scripts/check.py --full
      - name: CLI help smoke test
        run: uv run python main.py --cli --help
      - name: GUI smoke test
        run: uv run python main.py --gui --smoke-test
