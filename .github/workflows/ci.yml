name: Fast Gate

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: fast-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-gate:
    name: ubuntu-24.04
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install GUI runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libegl1
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Fast quality gate
        run: uv run python scripts/check.py --fast
